name: Android CI/CD Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Project Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle # ক্যাশিং এনাবল করার মাধ্যমে পরবর্তী বিল্ডগুলোর গতি বৃদ্ধি পাবে

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK with Gradle
      run: ./gradlew assembleDebug

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error # ফাইল খুঁজে না পেলে বিল্ডে এরর দেখাবে
        retention-days: 7 # আর্টিফ্যাক্টটি ৭ দিন পর্যন্ত ডাউনলোডের জন্য সংরক্ষিত থাকবে
